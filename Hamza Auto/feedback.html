<!DOCTYPE HTML>
<html>

<head>
  <link rel="stylesheet" href="feedback.css">
  <link rel="icon" type="image/jpg" href="Photos/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <title>Hamza Auto Feedback</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="head">
      <img src="Photos/icon.png">
      <h1>Hamza Auto Feedback</h1>
    </div>
  </div>
  <div class="container">
    <div class="form">
      <form method="post" action="">
        <div class="inputs">
          <div class="input1">
            <input type="text" placeholder="Enter your name" required>
          </div>
          <div class="input2">
            <input type="email" placeholder="Enter your email" required name="email">
          </div>
          <div class="input3">
            <input type="password" placeholder="Enter your password" required name="password">
          </div>
          <div class="ra">
            <div class="ra1">
              <span class="material-icons-round">
                sentiment_satisfied
              </span>
              <br>
              <input type="radio" required>
            </div>
            <div class="ra2">
              <span class="material-icons-round">
                mood_bad
              </span>
              <br>
              <input type="radio" required>
            </div>
            <div class="ra3">
              <span class="material-icons-round">
                sentiment_dissatisfied
              </span>
              <br>
              <input type="radio" required>
            </div>
          </div>
          <div class="input4">
            <input type="text" placeholder="Write your feedback" required>
          </div>
          <div class="input5">
            <button type="submit">Send Feedback</button>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="footer">
    <div class="logo">
      <img src="Photos/icon.png">
      <a href="Main.html">
        <h1>Hamza Auto</h1>
      </a>
    </div>
    <div class="text">
      <p>2023 Hamza Auto<br>
        Developed by Hamza
        <br>Terms of Service · Privacy Policy©
      </p>
    </div>
  </div>
</body>

</html>
